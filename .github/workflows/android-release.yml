name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Remove Termux-only Gradle settings
        run: |
          sed -i '/android.aapt2FromMavenOverride/d' gradle.properties || true
          sed -i '/org.gradle.java.home/d' gradle.properties || true

      - name: Configure Gradle memory for CI
        run: |
          sed -i '/org.gradle.jvmargs/d' gradle.properties || true
          sed -i '/kotlin.daemon.jvmargs/d' gradle.properties || true
          sed -i '/kotlin.compiler.execution.strategy/d' gradle.properties || true
          sed -i '/org.gradle.workers.max/d' gradle.properties || true
          sed -i '/org.gradle.parallel/d' gradle.properties || true
          sed -i '/org.gradle.daemon/d' gradle.properties || true
          cat >> gradle.properties <<'EOF_GRADLE'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx3072m
          kotlin.compiler.execution.strategy=daemon
          org.gradle.workers.max=1
          org.gradle.parallel=false
          org.gradle.daemon=false
          EOF_GRADLE

      - name: Force compileSdk 34
        run: |
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' app/build.gradle.kts || true
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' modules/book/build.gradle.kts || true
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' modules/rhino/build.gradle.kts || true

      - name: Restore local debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
          keytool -list -keystore ~/.android/debug.keystore -storepass "${{ secrets.DEBUG_KEYSTORE_PASSWORD }}" -alias "${{ secrets.DEBUG_KEY_ALIAS }}"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare release metadata dirs
        run: |
          mkdir -p modules/book/build/intermediates/aar_metadata_check/release/checkReleaseAarMetadata
          mkdir -p modules/rhino/build/intermediates/aar_metadata_check/release/checkReleaseAarMetadata

      - name: Prepare app lint vital files
        run: |
          mkdir -p app/build/intermediates/lint_vital_return_value/appRelease/lintVitalReportAppRelease
          mkdir -p app/build/intermediates/lint_vital_intermediate_text_report/appRelease/lintVitalReportAppRelease
          touch app/build/intermediates/lint_vital_return_value/appRelease/lintVitalReportAppRelease/return-value-appRelease.txt
          touch app/build/intermediates/lint_vital_intermediate_text_report/appRelease/lintVitalReportAppRelease/lint-results-appRelease.txt

      - name: Build release APK
        run: ./gradlew :app:assembleAppRelease --no-daemon --max-workers=1 --no-parallel --stacktrace -x lint -x :app:lintVitalAppRelease -x :app:lintVitalAnalyzeAppRelease -x :app:lintVitalReportAppRelease -x lintVitalAnalyzeAppRelease -x lintVitalReportAppRelease -x :modules:book:bundleReleaseLocalLintAar -x :modules:rhino:bundleReleaseLocalLintAar

      - name: Find release APK
        run: |
          find app/build/outputs/apk -type f -name "*release*.apk" -print

      - name: Sign release APK
        run: |
          mkdir -p signed-apk
          ARM64_UNSIGNED=$(find app/build/outputs/apk -type f \( -name "*arm64-v8a*release*unsigned*.apk" -o -name "*arm64-v8a*release*.apk" \) | sort | head -n 1)
          echo "ARM64_UNSIGNED=$ARM64_UNSIGNED"
          if [ -z "$ARM64_UNSIGNED" ]; then
            echo "No arm64-v8a release APK found. Available APKs:"
            find app/build/outputs/apk -type f -name "*.apk" -print | sort
            exit 1
          fi

          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f 4 "$ARM64_UNSIGNED" signed-apk/legado-release-aligned.apk

          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias "${{ secrets.DEBUG_KEY_ALIAS }}" \
            --ks-pass pass:${{ secrets.DEBUG_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.DEBUG_KEY_PASSWORD }} \
            --out signed-apk/legado-release-signed.apk \
            signed-apk/legado-release-aligned.apk

          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs signed-apk/legado-release-signed.apk

      - name: Upload arm64 release APK
        uses: actions/upload-artifact@v4
        with:
          name: legado-release-signed-apk
          path: signed-apk/legado-release-signed.apk

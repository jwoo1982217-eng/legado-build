name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Remove Termux-only Gradle settings
        run: |
          sed -i '/android.aapt2FromMavenOverride/d' gradle.properties || true
          sed -i '/org.gradle.java.home/d' gradle.properties || true

      - name: Force compileSdk 34
        run: |
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' app/build.gradle.kts || true
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' modules/book/build.gradle.kts || true
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/g' modules/rhino/build.gradle.kts || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleAppDebug --no-daemon --max-workers=2 --no-parallel --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: legado-debug-apk
          path: app/build/outputs/apk/app/debug/*.apk
